services:
  backend:
    build: ./backend
    env_file: .env
    environment:
      DATA_DIR: /data
      LOGS_DIR: /logs
    volumes:
      - ./data:/data
      - ./logs:/logs
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - dev-landing-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost/api
    networks:
      - dev-landing-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - dev-landing-net

  mailhog:
    profiles: ["dev"]
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - dev-landing-net

networks:
  dev-landing-net:
